name: Bug Report
description: Report a bug or regression in Pan
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pan version
      description: "Run: npx pan-ui --version or check package.json"
      placeholder: "0.2.4"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node.js version, Hermes version, and any relevant config.
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Chrome 130
        - Node.js: 20.10.0
        - Hermes: 0.6.0
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (console errors, terminal output, etc.)
      render: shell
